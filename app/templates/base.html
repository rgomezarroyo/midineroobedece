<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Herramientas financieras gratuitas para latinoamérica. Calculadoras de préstamos, ahorro, interés compuesto y más.{% endblock %}">
    <title>{% block title %}MiDineroObedece - Herramientas Financieras Gratis{% endblock %}</title>

    <!-- Canonical -->
    <link rel="canonical" href="https://midineroobedece.com{{ request.path }}">

    <!-- Open Graph -->
    <meta property="og:site_name" content="MiDineroObedece">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://midineroobedece.com{{ request.path }}">
    <meta property="og:title" content="{{ self.title() }}">
    <meta property="og:description" content="{{ self.meta_description() }}">
    <meta property="og:locale" content="es_ES">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ self.title() }}">
    <meta name="twitter:description" content="{{ self.meta_description() }}">

    <!-- JSON-LD Structured Data -->
    {% block json_ld %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "MiDineroObedece",
      "url": "https://midineroobedece.com",
      "description": "Herramientas financieras gratuitas para América Latina",
      "inLanguage": "es"
    }
    </script>
    {% endblock %}

    <!-- Google Search Console -->
    <meta name="google-site-verification" content="fwyHggyRdjEXDDfv7CDDwOOovK6P663vdX_2B4dbNOI" />

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2445512602031923" crossorigin="anonymous"></script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CMM6V374N2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CMM6V374N2');
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header>
        <nav>
            <a href="/" class="logo">MiDineroObedece</a>
            <button class="nav-toggle" id="nav-toggle" onclick="toggleNav()" aria-label="Abrir menú">
                <span></span><span></span><span></span>
            </button>
            <ul id="nav-menu">
                <li><a href="/calculadora-prestamos">Préstamos</a></li>
                <li><a href="/calculadora-ahorro">Ahorro</a></li>
                <li><a href="/calculadora-interes-compuesto">Interés Compuesto</a></li>
                <li><a href="/calculadora-presupuesto">Presupuesto</a></li>
                <li><a href="/calculadora-tarjeta-credito">Tarjeta</a></li>
                <li><a href="/calculadora-inflacion">Inflación</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>© 2026 MiDineroObedece &nbsp;·&nbsp; Herramientas financieras gratuitas para América Latina</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
    function toggleNav() {
        document.getElementById('nav-menu').classList.toggle('nav-open');
        document.getElementById('nav-toggle').classList.toggle('active');
    }
    </script>
</body>
</html>
